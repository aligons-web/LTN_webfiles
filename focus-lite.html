<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Focus Lite | LIFE Transformation Network</title>
<style>
:root{--purple:#24124d;--purple2:#3b1f7a;--gold:#ffd700;--white:#fff;--soft:rgba(255,255,255,.1)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,var(--purple),var(--purple2));color:var(--white)}header{text-align:center;padding:46px 20px 25px}h1{font-size:2.5rem;margin:0 0 10px;color:var(--gold)}p{line-height:1.6}.wrap{max-width:950px;margin:auto;padding:20px}.panel{background:var(--soft);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:26px;margin-bottom:24px}.question{margin:20px 0}label{display:block;font-weight:bold;margin-bottom:8px}textarea{width:100%;min-height:85px;border:0;border-radius:12px;padding:14px;font-size:1rem}button,.btn{display:inline-block;background:var(--gold);color:#222;border:0;border-radius:10px;padding:13px 22px;font-weight:bold;text-decoration:none;cursor:pointer;margin-top:12px}.result{display:none;background:rgba(0,0,0,.25);border:1px solid rgba(255,215,0,.35);border-radius:16px;padding:22px;margin-top:20px}.links{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}footer{text-align:center;opacity:.75;padding:35px 15px}@media(max-width:640px){h1{font-size:2rem}.wrap{padding:12px}}

/* ---------- PDF / PRINT ---------- */
.pdf-btn{background:#fff;color:#24124d;border:2px solid var(--gold);margin-left:10px}
.pdf-btn:hover{background:var(--gold)}
@media print{
  @page{margin:14mm}
  body{background:#fff !important;color:#1a1a1a !important;font-size:12pt}
  header{padding:0 0 12px}
  h1{color:#3b1f7a !important;font-size:22pt}
  h2,h3{color:#3b1f7a !important}
  .wrap{max-width:100%;padding:0}
  .panel,.item,.change-card,.question{background:#fff !important;border:1px solid #ccc !important;break-inside:avoid}
  .result[style*="block"]{background:#fff !important;border:1px solid #999 !important;color:#1a1a1a !important}
  .result:not([style*="block"]){display:none !important}
  .score{background:#3b1f7a !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  textarea,select,input{border:1px solid #bbb !important;color:#1a1a1a !important;background:#fff !important}
  button,.btn,.links,.pdf-btn{display:none !important}
  footer{opacity:1;color:#555;border-top:1px solid #ddd;margin-top:18px}
  a{color:#3b1f7a !important;text-decoration:none}
}

</style></head>
<body><header><h1>Focus Assessment Lite</h1><p>Step 5: What should I focus on first? Clarify your next priority.</p></header><main class="wrap"><section class="panel"><p>This quick-start focus tool helps you narrow your attention so you can move from reflection to action.</p><div id="questions"></div><button onclick="focusPlan()">Create My Focus Statement</button><button type="button" class="pdf-btn" onclick="window.print()">Download PDF</button><div id="result" class="result"></div></section><div class="links"><a class="btn" href="21-dayTransformation.html">Next: 21-Day Challenge</a><a class="btn" href="analyze-lite.html">Back: Analyze Change Lite</a></div></main><footer>LIFE Transformation Network © 2026</footer>
<script>
const qs=['What is the most important area to focus on right now?','What distraction or competing priority needs to be reduced?','What one habit would support your progress?','What support or resource would help you stay consistent?','What is your next small action?'];const box=document.getElementById('questions');qs.forEach((q,i)=>box.innerHTML+=`<div class="question"><label>${i+1}. ${q}</label><textarea id="q${i}" placeholder="Write your response..."></textarea></div>`);
function focusPlan(){let a=qs.map((_,i)=>document.getElementById('q'+i).value.trim());let r=document.getElementById('result');r.style.display='block';r.innerHTML=`<h2>Your Focus Statement</h2><p>For this season, I will focus on <strong>${a[0]||'my most important priority'}</strong>, reduce <strong>${a[1]||'unnecessary distractions'}</strong>, build the habit of <strong>${a[2]||'consistent action'}</strong>, and take this next step: <strong>${a[4]||'choose one small action today'}</strong>.</p><p>Now move into action through the 21-Day Transformation Challenge.</p>`;}
</script></body></html>
