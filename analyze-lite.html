<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Analyze Change Lite | LIFE Transformation Network</title>
<style>
:root{--purple:#24124d;--purple2:#3b1f7a;--gold:#ffd700;--white:#fff;--soft:rgba(255,255,255,.1)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,var(--purple),var(--purple2));color:var(--white)}header{text-align:center;padding:46px 20px 25px}h1{font-size:2.5rem;margin:0 0 10px;color:var(--gold)}p{line-height:1.6}.wrap{max-width:950px;margin:auto;padding:20px}.panel{background:var(--soft);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:26px;margin-bottom:24px}.change-card{margin:18px 0;padding:18px;background:rgba(0,0,0,.18);border-radius:14px}select,textarea{width:100%;border:0;border-radius:12px;padding:13px;font-size:1rem;margin-top:8px}textarea{min-height:70px}label{font-weight:bold}button,.btn{display:inline-block;background:var(--gold);color:#222;border:0;border-radius:10px;padding:13px 22px;font-weight:bold;text-decoration:none;cursor:pointer;margin-top:12px}.result{display:none;background:rgba(0,0,0,.25);border:1px solid rgba(255,215,0,.35);border-radius:16px;padding:22px;margin-top:20px}.links{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}footer{text-align:center;opacity:.75;padding:35px 15px}@media(max-width:640px){h1{font-size:2rem}.wrap{padding:12px}}

/* ---------- PDF / PRINT ---------- */
.pdf-btn{background:#fff;color:#24124d;border:2px solid var(--gold);margin-left:10px}
.pdf-btn:hover{background:var(--gold)}
@media print{
  @page{margin:14mm}
  body{background:#fff !important;color:#1a1a1a !important;font-size:12pt}
  header{padding:0 0 12px}
  h1{color:#3b1f7a !important;font-size:22pt}
  h2,h3{color:#3b1f7a !important}
  .wrap{max-width:100%;padding:0}
  .panel,.item,.change-card,.question{background:#fff !important;border:1px solid #ccc !important;break-inside:avoid}
  .result[style*="block"]{background:#fff !important;border:1px solid #999 !important;color:#1a1a1a !important}
  .result:not([style*="block"]){display:none !important}
  .score{background:#3b1f7a !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  textarea,select,input{border:1px solid #bbb !important;color:#1a1a1a !important;background:#fff !important}
  button,.btn,.links,.pdf-btn{display:none !important}
  footer{opacity:1;color:#555;border-top:1px solid #ddd;margin-top:18px}
  a{color:#3b1f7a !important;text-decoration:none}
}

</style></head>
<body><header><h1>Analyze Change Lite</h1><p>Step 4: What must change? Identify the areas that may require adjustment.</p></header><main class="wrap"><section class="panel"><p>Rate five change areas. This gives you a quick awareness check before deeper analysis inside the Transformation Builder App.</p><div id="areas"></div><button onclick="analyze()">Analyze My Change Needs</button><button type="button" class="pdf-btn" onclick="window.print()">Download PDF</button><div id="result" class="result"></div></section><div class="links"><a class="btn" href="focus-lite.html">Next: Focus Lite</a><a class="btn" href="purpose-lite.html">Back: Purpose Lite</a></div></main><footer>LIFE Transformation Network © 2026</footer>
<script>
const areas=['Mindset','Habits','Environment','Relationships / Support','Skills / Preparation'];const box=document.getElementById('areas');areas.forEach((a,i)=>box.innerHTML+=`<div class="change-card"><label>${a}</label><select id="rate${i}"><option value="1">Low need for change</option><option value="2">Moderate need for change</option><option value="3">High need for change</option></select><textarea id="note${i}" placeholder="What may need to change in this area?"></textarea></div>`);
function analyze(){let scores=areas.map((_,i)=>Number(document.getElementById('rate'+i).value));let max=Math.max(...scores);let top=areas.filter((_,i)=>scores[i]===max).join(', ');let notes=areas.map((a,i)=>document.getElementById('note'+i).value.trim()?`<li><strong>${a}:</strong> ${document.getElementById('note'+i).value.replace(/</g,'&lt;')}</li>`:'').join('');let r=document.getElementById('result');r.style.display='block';r.innerHTML=`<h2>Change Awareness Summary</h2><p><strong>Highest attention area(s):</strong> ${top}</p><p>Start with one clear adjustment. Change becomes manageable when it is specific and connected to your future vision.</p>${notes?`<ul>${notes}</ul>`:''}`;}
</script></body></html>
